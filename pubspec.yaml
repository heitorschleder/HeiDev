name: hei_dev
description: HeiDev — controle de contas domésticas.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.9.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # DI / State
  get_it: ^7.6.4
  injectable: ^2.3.0
  equatable: ^2.0.7

  # Backend
  supabase_flutter: ^2.8.4
  flutter_dotenv: ^5.2.1

  # Networking
  dio: ^5.9.0

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: 9.2.2

  # Routing
  go_router: ^14.2.0

  # Localização
  intl: ^0.20.2

  # UI
  flutter_svg: ^2.2.2
  google_fonts: ^6.1.0
  cached_network_image: ^3.4.1
  lottie: ^3.3.2
  cupertino_icons: ^1.0.8

  # Charts
  fl_chart: ^0.70.0

  # Utils
  logger: ^2.4.0
  json_annotation: ^4.9.0
  uuid: ^4.5.0

  # Import
  file_picker: ^8.0.0
  csv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.11.1
  flutter_lints: ^5.0.0
  injectable_generator: ^2.9.1
  json_serializable: ^6.11.1
  mocktail: ^1.0.4
  fake_async: ^1.3.3
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  ios: true
  android: false
  image_path: "assets/images/heidev.png"
  min_sdk_android: 21

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/svg/
    - assets/animations/
    - .env
